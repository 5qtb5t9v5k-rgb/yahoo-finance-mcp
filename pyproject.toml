[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
# Default + a couple of bug-spotters. Stay conservative — this is a
# small server, we don't need a maximalist lint config.
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",  # line length is enforced by `line-length`, not lint rules
    "B008",  # FastMCP decorators look like B008 false positives
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # Allow `assert False` in tests
